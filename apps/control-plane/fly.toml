# =============================================================================
# Fly.io deployment for @imsg/control-plane.
#
# Build context is the MONOREPO ROOT so the Dockerfile can resolve the Bun
# workspace. Deploy from the repo root with:
#   fly deploy -c apps/control-plane/fly.toml --dockerfile apps/control-plane/Dockerfile
#
# Secrets (set via `fly secrets set ...`, NEVER committed):
#   DATABASE_URL, DEVICE_TOKEN_PEPPER,
#   AGENTPHONE_API_KEY, AGENTPHONE_AGENT_ID, AGENTPHONE_WEBHOOK_SECRET,
#   LLM_API_KEY
# =============================================================================
app = "imsg-control-plane"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  AGENTPHONE_API_BASE = "https://api.agentphone.ai"
  # Private LiteLLM proxy reached over Fly flycast (same org, no public IP).
  # LLM_API_KEY (a LiteLLM virtual key) is synced from .env.control via
  # apps/control-plane/scripts/sync-fly-secrets.sh.
  LLM_API_BASE = "http://imsg-litellm.flycast/v1"
  # Which backend the proxy routes to — must match a `model_name` in
  # apps/litellm/config.yaml. Two are wired:
  #   gemini-3.5-flash  (default) | gpt-oss-120b  (Cerebras, ~3000 tok/s)
  # To flip WITHOUT a rebuild: `fly secrets set LLM_MODEL=gpt-oss-120b -a imsg-control-plane`
  # (a Fly secret overrides this [env] value and restarts the machine). Revert
  # the same way with LLM_MODEL=gemini-3.5-flash. Editing this line needs a redeploy.
  LLM_MODEL = "gemini-3.5-flash"
  # PUBLIC origin of THIS control plane (the device + install.sh point at it).
  # Intentionally NOT set here: a hardcoded host would re-brand this OSS repo.
  # Each deployment supplies its own from .env.control via the sync script
  # (apps/control-plane/scripts/sync-fly-secrets.sh) — never `fly secrets set`
  # by hand. Unset => env.ts falls back to http://localhost:8080 (local dev).

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  # Keep at least one machine warm so the LISTEN/NOTIFY client stays connected
  # and long-polls are not cold-started.
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    # Long-polls hold a connection ~25s; allow plenty of concurrent waiters.
    soft_limit = 200
    hard_limit = 250

# Liveness/readiness probes against the health endpoints.
[[http_service.checks]]
  method = "get"
  path = "/healthz"
  interval = "15s"
  timeout = "5s"
  grace_period = "10s"

[[http_service.checks]]
  method = "get"
  path = "/readyz"
  interval = "30s"
  timeout = "8s"
  grace_period = "20s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
