# =============================================================================
# LiteLLM proxy config for imessage-coding's conversational assistant.
#
# Serves an OpenAI-compatible /v1/chat/completions endpoint with per-iMessage-user
# spend tracking (the control-plane tags each request with `user: <accountId>` ->
# LiteLLM_EndUserTable — proxy-side, so attribution works for EVERY backend below).
#
# TWO interchangeable backends live here; the control-plane picks one by sending
# its `model` field == LLM_MODEL (apps/control-plane/fly.toml [env]):
#   * gemini-3.5-flash  — Google Gemini (DEFAULT).
#   * gpt-oss-120b      — Cerebras gpt-oss-120B (~3000 tok/s; low-latency option).
# Flip by changing LLM_MODEL on the control-plane — both stay live here, so
# switching back and forth needs NO redeploy of this proxy.
#
# Secrets arrive via env (set with `fly secrets set` on the imsg-litellm app):
#   GEMINI_API_KEY       Google AI Studio key (backs gemini-3.5-flash)
#   CEREBRAS_API_KEY     Cerebras Inference key (backs gpt-oss-120b; optional)
#   LITELLM_MASTER_KEY   sk-... admin key (mints virtual keys)
#   LITELLM_SALT_KEY     sk-... encrypts stored creds — set ONCE, never rotate
#   DATABASE_URL         Neon Postgres (DIRECT/unpooled — Prisma migrate needs it)
# =============================================================================

model_list:
  - model_name: gemini-3.5-flash            # the id the control-plane sends (LLM_MODEL)
    litellm_params:
      model: gemini/gemini-3.5-flash         # Google AI Studio provider
      api_key: os.environ/GEMINI_API_KEY
      # Thinking left at the model default (ON): the texting layer is now a
      # conversational assistant that must understand fuzzy/multi-turn intent,
      # not a single-shot extractor. Lower it later with reasoning_effort if
      # latency/cost warrant.

  - model_name: gpt-oss-120b                # the id the control-plane sends (LLM_MODEL)
    litellm_params:
      model: cerebras/gpt-oss-120b           # Cerebras Inference (OpenAI-compatible)
      api_key: os.environ/CEREBRAS_API_KEY
      # gpt-oss is a reasoning model; reasoning_effort caps the hidden reasoning
      # tokens. `low` keeps turns fast/conversational — raise to medium|high if
      # answer quality warrants. (drop_params below tolerates it on any provider.)
      reasoning_effort: low

litellm_settings:
  drop_params: true                          # tolerate cross-provider params (response_format, etc.)
  # One high per-end-user sanity cap (USD). Every iMessage account (sent as the
  # OpenAI `user` field) auto-gets this budget without explicit registration.
  max_end_user_budget: 50

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  # store_model_in_db intentionally OFF — the model_list above is the source of truth.
