# fly.toml app configuration file generated for imsg-litellm on 2026-05-31T20:52:29Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'imsg-litellm'
primary_region = 'sjc'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8080
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '30s'
    method = 'get'
    path = '/health/liveliness'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
